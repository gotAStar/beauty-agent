<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Decision Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">Personalized Recommendations</p>
        <h1>Beauty Decision Assistant</h1>
        <p class="intro">Fill out the questionnaire to get your top 3 product picks.</p>

        <form id="profile-form" class="form">
          <label>
            Skin type
            <select name="skin_type">
              <option value="oily">Oily</option>
              <option value="dry">Dry</option>
              <option value="combination" selected>Combination</option>
              <option value="sensitive">Sensitive</option>
            </select>
          </label>

          <label>
            Concerns
            <select name="concerns" multiple size="5">
              <option value="acne">Acne</option>
              <option value="redness">Redness</option>
              <option value="texture">Texture</option>
              <option value="dryness">Dryness</option>
              <option value="dark-spots">Dark spots</option>
            </select>
          </label>

          <label>
            Budget
            <input type="number" name="budget" min="0" step="0.01" value="50" />
          </label>

          <label>
            Preferences
            <input
              type="text"
              name="preferences"
              placeholder="Optional preferences"
            />
          </label>

          <button type="submit">Submit profile</button>
        </form>

        <section class="result">
          <h2>Top Recommendations</h2>
          <p id="result-status" class="intro">Submit the form to see your recommendations.</p>
          <div id="recommendations-list" class="recommendations-list"></div>
        </section>
      </section>
    </main>

    <script src="/static/config.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
